# Build the Docker image, start the stack, and verify /health and /api/parse against example.com.
name: Scrape API CI

on:
  push:
  pull_request:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for /health
        run: |
          set -euo pipefail
          for _ in $(seq 1 90); do
            if curl -sf "http://127.0.0.1:3000/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Service did not become ready in time" >&2
          docker compose logs
          exit 1

      - name: API smoke test (scrape example.com)
        env:
          BASE_URL: http://127.0.0.1:3000
        run: bash scripts/self-test.sh

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down -v
